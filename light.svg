<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="1180" height="610">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%" stop-color="#06B6D4" stop-opacity="0.8">
        <animate attributeName="stop-opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%" stop-color="#10B981" stop-opacity="0.7">
        <animate attributeName="stop-opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      </stop>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animate attributeName="y1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="100%;200%;100%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowEmerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="scanlineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <clipPath id="roundedClip">
      <rect x="10" y="10" width="1160" height="590" rx="16" ry="16"/>
    </clipPath>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1180" height="610" rx="16" ry="16" fill="url(#bgGrad)"/>
  <rect width="1180" height="610" rx="16" ry="16" filter="url(#noise)" opacity="0.02" clip-path="url(#roundedClip)"/>
  <rect x="10" y="10" width="1160" height="590" rx="16" ry="16" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" clip-path="url(#roundedClip)"/>

  <circle cx="300" cy="300" r="250" fill="url(#glowCyan)" opacity="0.5">
    <animate attributeName="cx" values="300;350;300" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="300;250;300" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="250" r="300" fill="url(#glowBlue)" opacity="0.4">
    <animate attributeName="cx" values="850;800;850" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="250;300;250" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="500" r="200" fill="url(#glowEmerald)" opacity="0.3">
    <animate attributeName="cx" values="600;650;600" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="500;450;500" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Particles -->
  <circle cx="120" cy="80" r="1.5" fill="#06B6D4" opacity="0.5"><animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="250" cy="150" r="1" fill="#2563EB" opacity="0.4"><animate attributeName="cy" values="150;130;150" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="50" r="1.2" fill="#10B981" opacity="0.4"><animate attributeName="cy" values="50;35;50" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="100" r="1" fill="#06B6D4" opacity="0.3"><animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="60" r="1.5" fill="#2563EB" opacity="0.5"><animate attributeName="cy" values="60;40;60" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="950" cy="120" r="1" fill="#10B981" opacity="0.4"><animate attributeName="cy" values="120;100;120" dur="5.5s" repeatCount="indefinite"/></circle>
  <circle cx="1080" cy="70" r="1.2" fill="#06B6D4" opacity="0.4"><animate attributeName="cy" values="70;50;70" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="520" r="1" fill="#2563EB" opacity="0.3"><animate attributeName="cy" values="520;500;520" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="560" r="1.5" fill="#10B981" opacity="0.4"><animate attributeName="cy" values="560;540;560" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="1000" cy="540" r="1" fill="#06B6D4" opacity="0.5"><animate attributeName="cy" values="540;520;540" dur="4.5s" repeatCount="indefinite"/></circle>

  <rect x="10" y="10" width="1160" height="80" fill="url(#scanlineGrad)" clip-path="url(#roundedClip)">
    <animate attributeName="y" values="10;530;10" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- LEFT: ASCII Portrait -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="420" height="460" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="0" y="0" width="420" height="32" rx="12" ry="12" fill="#F1F5F9"/>
    <rect x="0" y="16" width="420" height="16" fill="#F1F5F9"/>
    <circle cx="22" cy="16" r="5" fill="#EF4444"/>
    <circle cx="42" cy="16" r="5" fill="#F59E0B"/>
    <circle cx="62" cy="16" r="5" fill="#10B981"/>
    <text x="210" y="20" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="11">ascii@terminal ~ </text>

    <g fill="url(#asciiGrad)" font-family="monospace" font-size="10" filter="url(#glow)">
      <text x="30" y="65" opacity="0">
        █████╗ ██████╗ ████████╗██╗  ██╗██████╗  █████╗ ██████╗ ███████╗
        <animate attributeName="opacity" values="0;0;1" dur="0.1s" begin="0.5s" fill="freeze"/>
      </text>
      <text x="30" y="78" opacity="0">
       ██╔══██╗██╔══██╗╚══██╔══╝██║  ██║██╔══██╗██╔══██╗██╔══██╗██╔════╝
        <animate attributeName="opacity" values="0;0;1" dur="0.1s" begin="0.8s" fill="freeze"/>
      </text>
      <text x="30" y="91" opacity="0">
        ███████║██████╔╝   ██║   ███████║██████╔╝███████║██████╔╝█████╗
        <animate attributeName="opacity" values="0;0;1" dur="0.1s" begin="1.1s" fill="freeze"/>
      </text>
      <text x="30" y="104" opacity="0">
        ██╔══██║██╔══██╗   ██║   ██╔══██║██╔══██╗██╔══██║██╔═══╝ ██╔══╝
        <animate attributeName="opacity" values="0;0;1" dur="0.1s" begin="1.4s" fill="freeze"/>
      </text>
      <text x="30" y="117" opacity="0">
        ██║  ██║██████╔╝   ██║   ██║  ██║██████╔╝██║  ██║██║     ███████╗
        <animate attributeName="opacity" values="0;0;1" dur="0.1s" begin="1.7s" fill="freeze"/>
      </text>
      <text x="30" y="130" opacity="0">
        ╚═╝  ╚═╝╚═════╝    ╚═╝   ╚═╝  ╚═╝╚═════╝ ╚═╝  ╚═╝╚═╝     ╚══════╝
        <animate attributeName="opacity" values="0;0;1" dur="0.1s" begin="2.0s" fill="freeze"/>
      </text>
    </g>

    <rect x="30" y="145" width="8" height="14" fill="#06B6D4" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" dur="1s" begin="2.2s" repeatCount="indefinite"/>
    </rect>

    <g fill="#0F172A" font-family="monospace" font-size="13">
      <text x="30" y="180" opacity="0">
        <tspan fill="#06B6D4">▸</tspan> Location: <tspan fill="#10B981">India</tspan>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
      </text>
      <text x="30" y="205" opacity="0">
        <tspan fill="#06B6D4">▸</tspan> Focus: <tspan fill="#10B981">MERN Stack</tspan>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.8s" fill="freeze"/>
      </text>
      <text x="30" y="230" opacity="0">
