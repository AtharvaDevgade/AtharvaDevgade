  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="560" height="460" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="0" y="0" width="560" height="32" rx="12" ry="12" fill="#F1F5F9"/>
    <rect x="0" y="16" width="560" height="16" fill="#F1F5F9"/>
    <circle cx="22" cy="16" r="5" fill="#EF4444"/>
