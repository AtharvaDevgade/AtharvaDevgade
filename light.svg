      <g filter="url(#softGlow)">
        <circle cx="16" cy="16" r="14" fill="#F1F5F9" stroke="#06B6D4" stroke-width="0.5"/>
        <path d="M16 6C10.48 6 6 10.48 6 16c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0116 9.69c.85.004 1.71.12 2.51.34 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10.01 10.01 0 0026 16c0-5.52-4.48-10-10-10z" fill="#06B6D4"/>
      </g>
      <g transform="translate(48, 0)" filter="url(#softGlow)">
        <circle cx="16" cy="16" r="14" fill="#F1F5F9" stroke="#2563EB" stroke-width="0.5"/>
        <path d="M8 10h3v10H8V10zm1.5-1.5a1.75 1.75 0 110 3.5 1.75 1.75 0 010-3.5zM13 10h2.9v1.4h.04c.4-.76 1.38-1.56 2.84-1.56 3.04 0 3.6 2 3.6 4.6V20h-3v-5.1c0-1.22-.02-2.78-1.7-2.78-1.7 0-1.96 1.32-1.96 2.69V20h-3V10z" fill="#2563EB"/>
