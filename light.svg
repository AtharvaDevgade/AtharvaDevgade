        <rect x="266" y="0" width="88" height="24" rx="12" fill="url(#pillGrad)" stroke="#E2E8F0" stroke-width="1"/>
        <text x="310" y="16" text-anchor="middle" fill="#06B6D4">MongoDB</text>
        <rect x="364" y="0" width="98" height="24" rx="12" fill="url(#pillGrad)" stroke="#E2E8F0" stroke-width="1"/>
        <text x="413" y="16" text-anchor="middle" fill="#06B6D4">TailwindCSS</text>
        <rect x="0" y="34" width="68" height="24" rx="12" fill="url(#pillGrad)" stroke="#E2E8F0" stroke-width="1"/>
        <text x="34" y="50" text-anchor="middle" fill="#2563EB">Python</text>
        <rect x="78" y="34" width="72" height="24" rx="12" fill="url(#pillGrad)" stroke="#E2E8F0" stroke-width="1"/>
        <text x="114" y="50" text-anchor="middle" fill="#2563EB">Docker</text>
        <rect x="160" y="34" width="58" height="24" rx="12" fill="url(#pillGrad)" stroke="#E2E8F0" stroke-width="1"/>
        <text x="189" y="50" text-anchor="middle" fill="#2563EB">Git</text>
        <rect x="228" y="34" width="68" height="24" rx="12" fill="url(#pillGrad)" stroke="#E2E8F0" stroke-width="1"/>
        <text x="262" y="50" text-anchor="middle" fill="#2563EB">Linux</text>
        <rect x="306" y="34" width="72" height="24" rx="12" fill="url(#pillGrad)" stroke="#E2E8F0" stroke-width="1"/>
        <text x="342" y="50" text-anchor="middle" fill="#10B981">Ollama</text>
        <rect x="388" y="34" width="52" height="24" rx="12" fill="url(#pillGrad)" stroke="#E2E8F0" stroke-width="1"/>
