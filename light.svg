        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.1s" fill="freeze"/>
      </text>
      <text x="30" y="255" opacity="0">
        <tspan fill="#06B6D4">▸</tspan> Focus: <tspan fill="#10B981">Open Source</tspan>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.4s" fill="freeze"/>
      </text>
      <text x="30" y="280" opacity="0">
        <tspan fill="#06B6D4">▸</tspan> OS: <tspan fill="#10B981">Linux</tspan>
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.7s" fill="freeze"/>
      </text>
    </g>

    <animateTransform attributeName="transform" type="translate" values="80,80;80,75;80,80" dur="6s" repeatCount="indefinite"/>
  </g>

