<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)" stroke="#1E293B" stroke-width="1"/>
  <rect width="400" height="28" rx="12" fill="#1E293B"/>
  <rect width="400" height="14" y="14" fill="#1E293B"/>
  <circle cx="20" cy="14" r="5" fill="#EF4444"/>
  <circle cx="38" cy="14" r="5" fill="#F59E0B"/>
  <circle cx="56" cy="14" r="5" fill="#10B981"/>
  <text x="200" y="18" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="10">terminal</text>
  <text x="20" y="60" fill="#22D3EE" font-family="monospace" font-size="12" filter="url(#glow)">
    <tspan x="20" dy="0">$</tspan>
    <tspan fill="#F8FAFC" dx="8">echo "Hello from Atharva"</tspan>
    <tspan x="20" dy="20" fill="#10B981">Hello from Atharva</tspan>
    <tspan x="20" dy="20" fill="#22D3EE">$</tspan>
    <tspan fill="#F8FAFC" dx="8">neofetch</tspan>
    <tspan x="20" dy="20" fill="#94A3B8">OS: Linux</tspan>
    <tspan x="20" dy="18" fill="#94A3B8">Shell: zsh</tspan>
    <tspan x="20" dy="18" fill="#94A3B8">Editor: VS Code</tspan>
    <tspan x="20" dy="18" fill="#22D3EE">$</tspan>
    <rect x="36" y="148" width="8" height="14" fill="#22D3EE">
      <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </text>
</svg>
