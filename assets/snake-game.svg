<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300" width="280" height="300">
  <style>
    text { font-family: monospace; }
  </style>

  <!-- Phone body -->
  <rect x="10" y="10" width="260" height="290" rx="15" fill="#c8c8c8" stroke="#999" stroke-width="2"/>
  
  <!-- Screen border -->
  <rect x="25" y="30" width="230" height="185" rx="5" fill="#8b9e6b" stroke="#6b7e4b" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="30" y="35" width="220" height="175" fill="#9bbc0f"/>

  <!-- Grid lines -->
  <g stroke="#8bac0f" stroke-width="0.5" opacity="0.3">
    <line x1="30" y1="55" x2="250" y2="55"/><line x1="30" y1="75" x2="250" y2="75"/>
    <line x1="30" y1="95" x2="250" y2="95"/><line x1="30" y1="115" x2="250" y2="115"/>
    <line x1="30" y1="135" x2="250" y2="135"/><line x1="30" y1="155" x2="250" y2="155"/>
    <line x1="30" y1="175" x2="250" y2="175"/><line x1="30" y1="195" x2="250" y2="195"/>
    <line x1="50" y1="35" x2="50" y2="210"/><line x1="70" y1="35" x2="70" y2="210"/>
    <line x1="90" y1="35" x2="90" y2="210"/><line x1="110" y1="35" x2="110" y2="210"/>
    <line x1="130" y1="35" x2="130" y2="210"/><line x1="150" y1="35" x2="150" y2="210"/>
    <line x1="170" y1="35" x2="170" y2="210"/><line x1="190" y1="35" x2="190" y2="210"/>
    <line x1="210" y1="35" x2="210" y2="210"/><line x1="230" y1="35" x2="230" y2="210"/>
  </g>

  <!-- APPLE - random positions -->
  <rect width="18" height="18" fill="#0f380f" opacity="1">
    <animate attributeName="x" values="70;190;50;210;130" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="75;55;155;135;95" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;1;1;1" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- SNAKE BODY -->
  <g>
    <!-- tail -->
    <rect width="18" height="18" fill="#306230" opacity="0.8">
      <animate attributeName="x" values="130;170;210;210;170;130;90;50;50;90" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="95;95;95;135;175;175;175;175;135;95" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect width="18" height="18" fill="#306230" opacity="0.8">
      <animate attributeName="x" values="150;190;230;230;190;150;110;70;70;110" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="95;95;95;135;175;175;175;175;135;95" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect width="18" height="18" fill="#306230" opacity="0.9">
      <animate attributeName="x" values="170;210;230;230;210;170;130;90;90;130" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="95;95;95;135;175;175;175;175;135;95" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect width="18" height="18" fill="#306230" opacity="0.95">
      <animate attributeName="x" values="190;230;210;210;230;190;150;110;110;150" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="95;95;95;135;175;175;175;175;135;95" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect width="18" height="18" fill="#306230">
      <animate attributeName="x" values="210;230;190;190;230;210;170;130;130;170" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="95;95;95;135;175;175;175;175;135;95" dur="8s" repeatCount="indefinite"/>
    </rect>
    
    <!-- HEAD -->
    <rect width="20" height="20" fill="#0f380f">
      <animate attributeName="x" values="230;210;170;170;210;230;190;150;150;190" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="95;95;95;135;175;175;175;175;135;95" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Nokia label -->
  <text x="140" y="240" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">NOKIA</text>
  
  <!-- Score -->
  <text x="140" y="260" text-anchor="middle" fill="#444" font-size="10">SCORE: 99</text>

  <!-- Buttons -->
  <circle cx="90" cy="275" r="10" fill="#aaa" stroke="#888" stroke-width="1"/>
  <circle cx="140" cy="275" r="10" fill="#aaa" stroke="#888" stroke-width="1"/>
  <circle cx="190" cy="275" r="10" fill="#aaa" stroke="#888" stroke-width="1"/>

</svg>
