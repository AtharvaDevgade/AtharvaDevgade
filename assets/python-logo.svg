<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#306998">
        <animate attributeName="stop-color" values="#306998;#4B8BBE;#306998" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4B8BBE">
        <animate attributeName="stop-color" values="#4B8BBE;#306998;#4B8BBE" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD43B">
        <animate attributeName="stop-color" values="#FFD43B;#FFE873;#FFD43B" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFE873">
        <animate attributeName="stop-color" values="#FFE873;#FFD43B;#FFE873" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#306998" stroke-width="2" opacity="0.9"/>

  <!-- Rotating ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#blue)" stroke-width="1" stroke-dasharray="10,5" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Python Logo - Blue snake (top) -->
  <g filter="url(#glow)" transform="translate(100,100)">
    <animateTransform attributeName="transform" type="translate" values="100,100;100,97;100,100" dur="2s" repeatCount="indefinite"/>
    
    <!-- Blue snake body -->
    <path d="M-30,-35 C-30,-55 10,-60 30,-40 C50,-20 40,10 20,20 C0,30 -20,20 -30,0 C-40,-20 -50,-15 -45,-35" 
          fill="none" stroke="url(#blue)" stroke-width="12" stroke-linecap="round">
      <animate attributeName="stroke-width" values="12;14;12" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Blue snake head -->
    <circle cx="-30" cy="-35" r="8" fill="url(#blue)"/>
    <circle cx="-33" cy="-37" r="2" fill="#fff"/>
    
    <!-- Yellow snake body -->
    <path d="M30,35 C30,55 -10,60 -30,40 C-50,20 -40,-10 -20,-20 C0,-30 20,-20 30,0 C40,20 50,15 45,35" 
          fill="none" stroke="url(#yellow)" stroke-width="12" stroke-linecap="round">
      <animate attributeName="stroke-width" values="12;14;12" dur="2s" repeatCount="indefinite" begin="1s"/>
    </path>
    
    <!-- Yellow snake head -->
    <circle cx="30" cy="35" r="8" fill="url(#yellow)"/>
    <circle cx="33" cy="37" r="2" fill="#333"/>
  </g>

  <!-- Floating particles -->
  <circle cx="40" cy="40" r="2" fill="#4B8BBE" opacity="0.6">
    <animate attributeName="cy" values="40;30;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="50" r="1.5" fill="#FFD43B" opacity="0.5">
    <animate attributeName="cy" values="50;38;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="160" r="1.5" fill="#4B8BBE" opacity="0.5">
    <animate attributeName="cy" values="160;148;160" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="155" r="2" fill="#FFD43B" opacity="0.6">
    <animate attributeName="cy" values="155;143;155" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Text -->
  <text x="100" y="185" text-anchor="middle" fill="#4B8BBE" font-family="monospace" font-size="14" font-weight="bold" filter="url(#shadow)">
    Python
    <animate attributeName="fill" values="#4B8BBE;#FFD43B;#4B8BBE" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
